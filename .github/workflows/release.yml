name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build unsigned APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE }}
        run: |
          # Decode keystore
          echo "$KEYSTORE_B64" | base64 -d > signing.keystore
          
          # Find the unsigned APK
          UNSIGNED=$(find . -path "*/build/outputs/apk/release/*-unsigned.apk" -print -quit)
          [ -z "$UNSIGNED" ] && UNSIGNED=$(find . -path "*/build/outputs/apk/release/*.apk" -print -quit)
          
          # Sign it
          SIGNED="${UNSIGNED%-unsigned.apk}.apk"
          SIGNED="${SIGNED%.apk}-signed.apk"
          
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks signing.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --in "$UNSIGNED" \
            --out "$SIGNED"
          
          echo "SIGNED_APK=$SIGNED" >> "$GITHUB_ENV"
          echo "Signed: $SIGNED"

      - name: Find APK for release
        id: apk
        run: |
          APK="${{ env.SIGNED_APK }}"
          [ -z "$APK" ] && APK=$(find . -path "*/build/outputs/apk/release/*.apk" -not -name "*unsigned*" -print -quit)
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
